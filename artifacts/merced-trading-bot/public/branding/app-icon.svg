<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0B0B0B"/>
    </radialGradient>
  </defs>

  <!-- Background with iOS/Android rounded corner ratio (22.5%) -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="512" height="512" rx="115" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.12"/>

  <!-- MTB monogram — centered in 512×512 -->
  <!-- Monogram is 80×28 units → scaled ×5.6 = 448×156.8; offset x=32, y=177.6 -->
  <g transform="translate(32, 178) scale(5.6)" fill="#D4AF37">
    <!-- M -->
    <path d="M 0,28 L 0,0 L 4.5,0 L 12.5,11 L 20.5,0 L 25,0 L 25,28 L 20.5,28 L 20.5,6 L 12.5,16 L 4.5,6 L 4.5,28 Z"/>
    <!-- T -->
    <path d="M 32,0 L 54,0 L 54,4.5 L 45.25,4.5 L 45.25,28 L 40.75,28 L 40.75,4.5 L 32,4.5 Z"/>
    <!-- B stem -->
    <path d="M 61,0 L 61,28 L 65.5,28 L 65.5,0 Z"/>
    <!-- B top bowl -->
    <path fill-rule="evenodd" d="M 65.5,0 A 13,6.75 0 0 1 65.5,13.5 Z M 65.5,3 A 9.5,3.75 0 0 1 65.5,11 Z"/>
    <!-- B bottom bowl -->
    <path fill-rule="evenodd" d="M 65.5,14.5 A 14,6.75 0 0 1 65.5,28 Z M 65.5,17.5 A 10,3.75 0 0 1 65.5,25 Z"/>
  </g>

  <!-- Precision accent line — top gold rule -->
  <line x1="64" y1="88" x2="448" y2="88" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>
  <!-- Bottom gold rule -->
  <line x1="64" y1="424" x2="448" y2="424" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>
</svg>
